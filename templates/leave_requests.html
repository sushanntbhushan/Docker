<!DOCTYPE html>
<html>
<head>
    <title>Leave Requests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>📋 Leave Requests</h4>
        </div>

        <div class="card-body">

            <table class="table table-bordered">
                <tr>
                    <th>User</th>
                    <th>Date</th>
                    <th>Reason</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>

                {% for r in requests %}
                <tr>
                    <td>{{ r[1] }}</td>
                    <td>{{ r[0].date }}</td>
                    <td>{{ r[0].reason }}</td>
                    <td>{{ r[0].status }}</td>
                    <td>
                        {% if r[0].status == "Pending" %}
                        <a href="/approve_leave/{{ r[0].id }}" class="btn btn-success btn-sm">Approve</a>
                        <a href="/reject_leave/{{ r[0].id }}" class="btn btn-danger btn-sm">Reject</a>
                        {% endif %}
                    </td>
                </tr>
                {% endfor %}

            </table>

        </div>
    </div>

</div>

</body>
</html>
