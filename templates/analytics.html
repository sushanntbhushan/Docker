<!DOCTYPE html>
<html>
<head>
    <title>Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4>📊 Attendance Analytics</h4>
        </div>
		<form method="POST" class="row g-3 mb-3">

    		  <div class="col-md-4">
        	  	<label>Start Date</label>
        		<input type="date" name="start_date" class="form-control" value="{{ start_date }}">
    		  </div>

    		  <div class="col-md-4">
        		<label>End Date</label>
        		<input type="date" name="end_date" class="form-control" value="{{ end_date }}">
    		  </div>

    		  <div class="col-md-4 d-flex align-items-end">
        		<button class="btn btn-primary w-100">Filter</button>
    		  </div>

		</form>
        <div class="card-body">

            <table class="table table-bordered table-striped">
                <thead class="table-dark">
                    <tr>
                        <th>User</th>
                        <th>Total</th>
                        <th>Present</th>
                        <th>Late</th>
                        <th>Half Day</th>
                        <th>Absent</th>
                    </tr>
                </thead>

                <tbody>
                {% for r in report %}
                    <tr>
                        <td>{{ r.username }}</td>
                        <td>{{ r.total }}</td>
                        <td><span class="badge bg-success">{{ r.present }}</span></td>
                        <td><span class="badge bg-warning">{{ r.late }}</span></td>
                        <td><span class="badge bg-info">{{ r.half }}</span></td>
                        <td><span class="badge bg-danger">{{ r.absent }}</span></td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
